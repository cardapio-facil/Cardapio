<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Painel - Restaurante 40 graus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: #800020;
            font-size: 2rem;
        }

        .status-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .status-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #800020;
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
        }

        .status-box.novos { border-color: #4CAF50; }
        .status-box.preparando { border-color: #FFC107; }
        .status-box.saiu { border-color: #2196F3; }
        .status-box.entregue { border-color: #9C27B0; }
        .status-box.cancelado { border-color: #dc3545; }

        .status-box .numero {
            font-size: 2rem;
            font-weight: 700;
            color: #800020;
        }

        .admin-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid #800020;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .admin-btn.ativo {
            background: #800020;
            color: #fff;
            border-color: #fff;
        }

        .admin-btn:hover {
            transform: rotate(90deg);
            background: #800020;
        }

        .filtros {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filtro-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #800020;
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .filtro-btn.ativo {
            background: #800020;
            color: #fff;
        }

        .filtro-btn:hover {
            background: #800020;
            transform: translateY(-2px);
        }

        .pedidos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .pedido-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #800020;
            border-radius: 15px;
            padding: 20px;
            position: relative;
            transition: all 0.3s;
        }

        .pedido-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(128,0,32,0.3);
        }

        .pedido-card.novo { border-left: 5px solid #4CAF50; }
        .pedido-card.preparando { border-left: 5px solid #FFC107; }
        .pedido-card.saiu { border-left: 5px solid #2196F3; }
        .pedido-card.entregue { border-left: 5px solid #9C27B0; opacity: 0.8; }
        .pedido-card.cancelado { border-left: 5px solid #dc3545; opacity: 0.7; }

        .pedido-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(128,0,32,0.3);
        }

        .pedido-numero {
            font-size: 1.2rem;
            font-weight: 700;
            color: #800020;
        }

        .pedido-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-novo { background: #4CAF50; color: #fff; }
        .status-preparando { background: #FFC107; color: #000; }
        .status-saiu { background: #2196F3; color: #fff; }
        .status-entregue { background: #9C27B0; color: #fff; }
        .status-cancelado { background: #dc3545; color: #fff; }

        .pedido-cliente {
            font-size: 1.1rem;
            margin: 10px 0;
            font-weight: 600;
        }

        .pedido-info {
            margin: 10px 0;
            font-size: 0.9rem;
            color: #ddd;
        }

        .pedido-info div {
            margin: 5px 0;
        }

        .pedido-total {
            font-size: 1.3rem;
            color: #800020;
            font-weight: 700;
            margin: 10px 0;
            text-align: right;
        }

        .pedido-frete {
            font-size: 0.9rem;
            color: #FFC107;
            text-align: right;
            margin-top: -5px;
        }
                
        .pedido-acoes {
         display: grid;
            grid-template-columns: repeat(auto-fit, minmax(85px, 1fr));
            gap: 5px;
            margin-top: 15px;
            margin-top: 15px;
        }
    .btn-acao {
    width: 100%;
    padding: 8px 2px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 0.7rem;
    text-align: center;
    line-height: 1.1;
    white-space: nowrap;
    letter-spacing: 0.2px;
}

.btn-acao i {
    font-size: 0.7rem;
    margin-right: 2px;
}


        .btn-acao i {
        font-size: 0.75rem;
        display: inline-block; 
        }

        .btn-preparar { background: #FFC107; color: #000; }
        .btn-saiu { background: #2196F3; color: #fff; }
        .btn-entregue { background: #4CAF50; color: #fff; }
        .btn-cancelar { background: #dc3545; color: #fff; }
        .btn-wpp { background: #25D366; color: #fff; }
        .btn-imprimir { background: #FF9800; color: #fff; }
        .btn-detalhes { background: #9C27B0; color: #fff; }

        .btn-acao:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-acao i {
            font-size: 0.8rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            border: 2px solid #800020;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-form input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #800020;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
        }

        .login-form input:focus {
            outline: none;
            border-color: #fff;
        }

        .bairros-lista {
            margin: 20px 0;
        }

        .bairro-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #800020;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .bairro-info {
            flex: 1;
        }

        .bairro-nome {
            font-weight: 600;
            color: #800020;
        }

        .bairro-frete {
            color: #FFC107;
        }

        .bairro-acoes {
            display: flex;
            gap: 10px;
        }

        .btn-bairro {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
        }

        .btn-bairro.editar:hover { color: #FFC107; }
        .btn-bairro.excluir:hover { color: #dc3545; }

        .novo-bairro {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .novo-bairro input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid #800020;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            min-width: 150px;
        }

        .badge-novo {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #4CAF50;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            border: 2px solid #fff;
        }

        .detalhes-pedido table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .detalhes-pedido td {
            padding: 8px 5px;
            border-bottom: 1px solid rgba(128,0,32,0.3);
        }

        .detalhes-pedido td:first-child {
            font-weight: 600;
            color: #800020;
            width: 120px;
        }

        .detalhes-pedido h3 {
            color: #800020;
            margin: 20px 0 10px;
        }

        .detalhes-pedido .item-detalhe {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #800020;
        }

@media (max-width: 768px) {
    .pedido-acoes {
        grid-template-columns: repeat(auto-fit, minmax(75px, 1fr));
        gap: 3px;
    }
    
    .btn-acao {
        font-size: 0.65rem;
        padding: 6px 1px;
    }
    
    .btn-acao i {
        font-size: 0.65rem;
        margin-right: 1px;
    }
}
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="logo-container" style="width: 60px; height: 60px; border-radius: 50%; overflow: hidden; border: 2px solid #800020;">
                <img id="logoImg" src="img/logorestaurante1.png" alt="Logo 40 Graus" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='https://via.placeholder.com/60/800020/ffffff?text=40G'">
            </div>
            <div>
                <h1 id="nomeRestaurante">📊 Painel - 40 Graus</h1>
                <p id="dataAtual"></p>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="status-info">
                <div class="status-box novos">
                    <div class="numero" id="totalNovos">0</div>
                    <div>Novos</div>
                </div>
                <div class="status-box preparando">
                    <div class="numero" id="totalPreparando">0</div>
                    <div>Preparando</div>
                </div>
                <div class="status-box saiu">
                    <div class="numero" id="totalSaiu">0</div>
                    <div>Saiu</div>
                </div>
                <div class="status-box entregue">
                    <div class="numero" id="totalEntregue">0</div>
                    <div>Entregues</div>
                </div>
                <div class="status-box cancelado">
                    <div class="numero" id="totalCancelado">0</div>
                    <div>Cancelados</div>
                </div>
            </div>
            <button class="admin-btn" id="adminBtn" onclick="abrirModalLogin()">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </div>

    <div class="filtros">
        <button class="filtro-btn ativo" onclick="filtrarPedidos('todos', event)">📋 Todos (2 dias)</button>
        <button class="filtro-btn" onclick="filtrarPedidos('novo', event)">🟢 Novos</button>
        <button class="filtro-btn" onclick="filtrarPedidos('preparando', event)">🟡 Preparando</button>
        <button class="filtro-btn" onclick="filtrarPedidos('saiu', event)">🔵 Saiu</button>
        <button class="filtro-btn" onclick="filtrarPedidos('entregue', event)">✅ Entregues (2 dias)</button>
        <button class="filtro-btn" onclick="filtrarPedidos('cancelado', event)">❌ Cancelados</button>
    </div>

    <div class="pedidos-grid" id="pedidosGrid">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i> Carregando pedidos...
        </div>
    </div>

    <!-- MODAL LOGIN -->
    <div class="modal" id="modalLogin">
        <div class="modal-content">
            <h2 style="color: #800020; margin-bottom: 20px;">🔐 Login Admin</h2>
            <div class="login-form">
                <input type="password" id="senhaAdmin" placeholder="Digite a senha" onkeypress="if(event.key==='Enter') verificarLogin()">
                <button class="btn-acao" onclick="verificarLogin()" style="background:#800020; color:#fff;">Entrar</button>
                <button class="btn-acao" onclick="fecharModal('modalLogin')" style="background:#333;">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIG BAIRROS -->
    <div class="modal" id="modalBairros">
        <div class="modal-content">
            <h2 style="color: #800020; margin-bottom: 20px;">🏘️ Configurar Bairros Atendidos</h2>
            
            <div class="bairros-lista" id="bairrosLista">
                <!-- Cidades e bairros serão carregados aqui -->
            </div>

            <button class="btn-acao" onclick="fecharModal('modalBairros')" style="width:100%; margin-top:20px; background:#800020; color:#fff;">Fechar</button>
        </div>
    </div>

    <!-- MODAL DETALHES -->
    <div class="modal" id="modalDetalhes">
        <div class="modal-content">
            <h2 style="color: #800020; margin-bottom: 20px;">📋 Detalhes do Pedido</h2>
            <div id="detalhesConteudo" class="detalhes-pedido"></div>
            <button class="btn-acao" onclick="fecharModal('modalDetalhes')" style="width:100%; margin-top:20px; background:#800020; color:#fff;">Fechar</button>
        </div>
    </div>

    <audio id="notificacaoSonora" preload="auto" style="display:none;"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ===== CONFIGURAÇÃO =====
        const RESTAURANTE_ID = 'restaurante1';
        
        const firebaseConfig = {
            apiKey: "AIzaSyDjJG3qD1OhPJ_N-mfzH-ChMvHAez6XsGc",
            authDomain: "graus-38cce.firebaseapp.com",
            databaseURL: "https://graus-38cce-default-rtdb.firebaseio.com",
            projectId: "graus-38cce",
            storageBucket: "graus-38cce.firebasestorage.app",
            messagingSenderId: "167323638749",
            appId: "1:167323638749:web:6675d3d1edec31096b7434"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const dbRef = database.ref('restaurantes/' + RESTAURANTE_ID);

        // ===== VARIÁVEIS GLOBAIS =====
        let todosPedidos = [];
        let todosBairros = {};
        let filtroAtual = 'todos';
        let adminLogado = false;
        let audioInterval = null;
        let ultimosPedidosNovos = new Set();
        let audioReproducoes = 0;
        
        const templateCache = new Map();

        // ===== CONFIGURAR ÁUDIO =====
        function configurarAudio() {
            const audio = document.getElementById('notificacaoSonora');
            audio.src = `img/som${RESTAURANTE_ID}.mp3`;
            audio.load();
        }

        // ===== PARAR ÁUDIO =====
        function pararAudio() {
            if (audioInterval) {
                clearInterval(audioInterval);
                audioInterval = null;
            }
            const audio = document.getElementById('notificacaoSonora');
            audio.pause();
            audio.currentTime = 0;
            audioReproducoes = 0;
        }

        // ===== TOCAR ÁUDIO (APENAS 2 VEZES) =====
        function tocarAudioNotificacao() {
            const audio = document.getElementById('notificacaoSonora');
            
            // Se já estiver tocando, para
            pararAudio();
            
            audioReproducoes = 0;
            
            // Função para tocar uma vez
            const tocarUmaVez = () => {
                audio.play().catch(e => console.log('Erro ao tocar som:', e));
                audioReproducoes++;
                
                // Se já tocou 2 vezes, para o intervalo
                if (audioReproducoes >= 2) {
                    pararAudio();
                }
            };
            
            // Toca imediatamente
            tocarUmaVez();
            
            // Configura intervalo para tocar de novo após 6 segundos (só mais uma vez)
            audioInterval = setInterval(() => {
                if (audioReproducoes < 2) {
                    tocarUmaVez();
                } else {
                    pararAudio();
                }
            }, 6000);
        }

        // ===== VERIFICAR NOVOS PEDIDOS =====
        function verificarNovosPedidos(pedidos) {
            const novosAgora = new Set(
                pedidos
                    .filter(p => p.status === 'novo')
                    .map(p => p.id)
            );
            
            // Verifica se tem pedido novo que não estava antes
            let temNovo = false;
            for (let id of novosAgora) {
                if (!ultimosPedidosNovos.has(id)) {
                    temNovo = true;
                    break;
                }
            }
            
            ultimosPedidosNovos = novosAgora;
            
            if (temNovo) {
                tocarAudioNotificacao();
            }
        }

        // ===== EVENTO DE CLIQUE PARA PARAR ÁUDIO =====
        document.addEventListener('click', function() {
            pararAudio();
        }, { once: false });

        // ===== VERIFICAR SE ESTÁ NO INTERVALO DE 2 DIAS =====
        function ultimos2Dias(timestamp) {
            const data = new Date(timestamp);
            const hoje = new Date();
            const doisDiasAtras = new Date();
            
            data.setHours(0, 0, 0, 0);
            hoje.setHours(0, 0, 0, 0);
            doisDiasAtras.setDate(hoje.getDate() - 2);
            doisDiasAtras.setHours(0, 0, 0, 0);
            
            return data >= doisDiasAtras;
        }

        // ===== VERIFICAR SE É HOJE =====
        function ehHoje(timestamp) {
            const data = new Date(timestamp);
            const hoje = new Date();
            
            data.setHours(0, 0, 0, 0);
            hoje.setHours(0, 0, 0, 0);
            
            return data.getTime() === hoje.getTime();
        }

        // ===== PEDIR PERMISSÃO PARA NOTIFICAÇÕES =====
        if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }

        // ===== MOSTRAR NOTIFICAÇÃO =====
        function mostrarNotificacao(titulo, corpo) {
            if (Notification.permission === 'granted') {
                new Notification(titulo, {
                    body: corpo,
                    icon: `img/logorestaurante1.png`,
                    requireInteraction: true
                });
            }
        }

        // ===== LISTENER PRINCIPAL =====
        function iniciarListenerUnico() {
            document.getElementById('pedidosGrid').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando pedidos...</div>';
            
            dbRef.on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (!data) {
                    document.getElementById('pedidosGrid').innerHTML = '<p style="text-align:center; grid-column:1/-1;">Nenhum dado encontrado</p>';
                    return;
                }
                
                // Nome do restaurante
                if (data.info?.nome) {
                    document.getElementById('nomeRestaurante').textContent = '📊 Painel - ' + data.info.nome;
                }
                
                // Carregar bairros
                todosBairros = {};
                if (data.bairros) {
                    todosBairros = data.bairros;
                }
                else if (data.atendimento) {
                    Object.entries(data.atendimento).forEach(([chave, valor]) => {
                        const partes = chave.split('_');
                        const bairroKey = partes[1];

                        todosBairros[bairroKey] = {
                            nome: bairroKey.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
                            frete: valor.frete
                        };
                    });
                }
                
                // Carregar pedidos
                if (data.pedidos) {
                    const pedidosAnteriores = [...todosPedidos];
                    todosPedidos = Object.entries(data.pedidos).map(([id, pedido]) => ({
                        id: id,
                        ...pedido
                    }));
                    
                    // Verificar novos pedidos
                    verificarNovosPedidos(todosPedidos);
                    
                    atualizarEstatisticas();
                    filtrarPedidos(filtroAtual);
                    templateCache.clear();
                }
            }, (error) => {
                console.error('❌ Erro no Firebase:', error);
                document.getElementById('pedidosGrid').innerHTML = '<p style="text-align:center; color:#800020;">Erro ao carregar dados</p>';
            });
        }

        // ===== ATUALIZAR ESTATÍSTICAS =====
        function atualizarEstatisticas() {
            const stats = { novo: 0, preparando: 0, saiu: 0, entregue: 0, cancelado: 0 };
            
            todosPedidos.forEach(pedido => {
                if (ehHoje(pedido.data) && stats.hasOwnProperty(pedido.status)) {
                    stats[pedido.status]++;
                }
            });

            document.getElementById('totalNovos').textContent = stats.novo;
            document.getElementById('totalPreparando').textContent = stats.preparando;
            document.getElementById('totalSaiu').textContent = stats.saiu;
            document.getElementById('totalEntregue').textContent = stats.entregue;
            document.getElementById('totalCancelado').textContent = stats.cancelado;
        }

        // ===== FILTRAR PEDIDOS =====
        function filtrarPedidos(filtro, event = null) {
            filtroAtual = filtro;
            
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('ativo');
            });
            if (event) event.target.classList.add('ativo');

            let resultado = [];
            
            if (filtro === 'todos') {
                resultado = todosPedidos.filter(p => ultimos2Dias(p.data));
            } 
            else if (filtro === 'entregue') {
                resultado = todosPedidos.filter(p => p.status === 'entregue' && ultimos2Dias(p.data));
            }
            else {
                resultado = todosPedidos.filter(p => p.status === filtro);
            }
            
            // Ordenar (mais recentes primeiro)
            resultado.sort((a, b) => new Date(b.data) - new Date(a.data));
            
            renderizarPedidos(resultado);
        }

        // ===== FORMATAR ENDEREÇO COMPLETO =====
        function getEnderecoCompleto(pedido) {
            if (!pedido.cliente) return 'Não informado';
            
            let endereco = '';
            
            if (pedido.cliente.endereco) {
                const rua = pedido.cliente.endereco.rua || '';
                const numero = pedido.cliente.endereco.numero || '';
                endereco = `${rua}, ${numero}`;
            }
            
            let bairro = '';
            if (pedido.cliente.endereco?.bairro) {
                bairro = pedido.cliente.endereco.bairro;
            } else if (pedido.cliente.bairro) {
                bairro = typeof pedido.cliente.bairro === 'object' ? pedido.cliente.bairro.nome : pedido.cliente.bairro;
            }
            
            if (bairro) {
                endereco += endereco ? ` - ${bairro}` : bairro;
            }
            
            return endereco || 'Endereço não informado';
        }

        // ===== RENDERIZAR PEDIDOS =====
        function renderizarPedidos(pedidos) {

                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; padding:50px;">Nenhum pedido encontrado</p>';

            }

            const fragment = document.createDocumentFragment();
            const template = document.createElement('template');

            pedidos.forEach(pedido => {

                    fragment.appendChild(templateCache.get(cacheKey).cloneNode(true));
                    return;
                }

                const statusClass = pedido.status || 'novo';
                const statusText = {
                    'novo': '🟢 NOVO',

                    'cancelado': '❌ CANCELADO'
                }[statusClass] || '🟢 NOVO';

                const dataPedido = new Date(pedido.data);
                const horaFormatada = dataPedido.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                const html = `

                        <div class="pedido-info">

                            <div><i class="fas fa-utensils"></i> ${pedido.itens?.length || 0} refeição(ões)</div>
                            <div><i class="fas fa-credit-card"></i> ${pedido.pagamento?.toUpperCase() || 'Não informado'}</div>

                            ${enderecoCompleto !== 'Não informado' ? `<div><i class="fas fa-map-marker-alt"></i> ${enderecoCompleto}</div>` : ''}
                        </div>

                        ${pedido.frete ? `<div class="pedido-frete">🚚 Frete: R$ ${pedido.frete.toFixed(2)}</div>` : ''}

                        <div class="pedido-total">
                            R$ ${(pedido.total || 0).toFixed(2)}
                        </div>

                        <div class="pedido-acoes">

                                ${statusClass === 'novo' ? `

                                        <i class="fas fa-utensils"></i> PREPARAR
                                    </button>
                                ` : ''}

                                ${statusClass === 'preparando' ? `
                                    <button class="btn-acao btn-saiu" onclick="atualizarStatus('${pedido.id}', 'saiu')">
                                        <i class="fas fa-motorcycle"></i> SAIU
                                    </button>
                                ` : ''}

                                ${statusClass === 'saiu' ? `
                                    <button class="btn-acao btn-entregue" onclick="atualizarStatus('${pedido.id}', 'entregue')">
                                        <i class="fas fa-check"></i> ENTREGUE
                                    </button>
                                ` : ''}

                                <button class="btn-acao btn-cancelar" onclick="atualizarStatus('${pedido.id}', 'cancelado')">
                                    <i class="fas fa-times"></i> CANCELAR
                                </button>
                            ` : ''}

                            <button class="btn-acao btn-wpp" onclick="enviarWhatsApp('${pedido.id}')">
                                <i class="fab fa-whatsapp"></i> WHATSAPP
                            </button>

        // ===== ATUALIZAR STATUS =====
        function atualizarStatus(pedidoId, novoStatus) {
            dbRef.child('pedidos/' + pedidoId + '/status').set(novoStatus)
                .then(() => console.log('Status atualizado'))
                .catch(error => {
                    console.error('Erro:', error);

        // ===== ENVIAR WHATSAPP (SEM EMOJIS) =====
        function enviarWhatsApp(pedidoId) {
            const pedido = todosPedidos.find(p => p.id === pedidoId);
            if (!pedido) return;

            let telefone = pedido.cliente?.telefone || '';
            telefone = telefone.replace(/\D/g, '');
            
            if (!telefone) {
                telefone = prompt('Digite o telefone do cliente (com DDD):', '55');
                if (!telefone) return;
            }

            if (!telefone.startsWith('55')) {
                telefone = '55' + telefone;
            }

            const statusMsg = {
                'novo': 'foi confirmado',
                'preparando': 'está sendo preparado',
                'saiu': 'saiu para entrega',
                'entregue': 'foi entregue',
                'cancelado': 'foi cancelado'
            }[pedido.status] || 'está em processamento';

            let mensagem = `40 GRAUS\n\nOlá ${pedido.cliente?.nome}, tudo bem?\n\nSeu pedido #${pedido.numero || pedido.id.slice(-4)} ${statusMsg}.`;
            
            if (pedido.frete) {
                mensagem += `\n\nSubtotal: R$ ${(pedido.total - pedido.frete).toFixed(2)}`;
                mensagem += `\nFrete: R$ ${pedido.frete.toFixed(2)}`;
                mensagem += `\nTotal: R$ ${pedido.total?.toFixed(2)}`;
            } else {
                mensagem += `\n\nTotal: R$ ${pedido.total?.toFixed(2)}`;
            }
            
            mensagem += `\n\nAgradecemos pela preferência!`;

            window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`, '_blank');
        }

        // ===== FUNÇÕES DE MODAL =====
        function abrirModalLogin() {
            if (adminLogado) {
                abrirModalBairros();
            } else {
                document.getElementById('modalLogin').style.display = 'flex';
                document.getElementById('senhaAdmin').focus();
            }

        function abrirModalBairros() {
            carregarBairros();
            document.getElementById('modalBairros').style.display = 'flex';
        }

        function fecharModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // ===== VERIFICAR LOGIN =====
        function verificarLogin() {
            const senhaDigitada = document.getElementById('senhaAdmin').value;
            
            dbRef.child('info/senha_master').once('value', (snapshot) => {
                const senhaCorreta = snapshot.val();
                
                if (senhaDigitada === senhaCorreta) {
                    adminLogado = true;
                    document.getElementById('adminBtn').classList.add('ativo');
                    fecharModal('modalLogin');
                    abrirModalBairros();
                } else {
                    alert('Senha incorreta!');
                }
            });
        }

        // ===== CARREGAR CIDADES E BAIRROS =====
        function carregarBairros() {
            const lista = document.getElementById('bairrosLista');
            
            database.ref('bairros_globais').once('value', (snapshot) => {
                const cidades = snapshot.val() || {};
                
                if (Object.keys(cidades).length === 0) {
                    lista.innerHTML = '<p style="text-align:center; color:#999;">Nenhuma cidade cadastrada</p>';
                    return;
                }

                let html = `
                    <div style="margin-bottom:20px;">
                        <label style="color:#800020; font-weight:600;">Selecione a cidade:</label>
                        <select id="seletorCidade" onchange="mudarCidade()" style="width:100%; padding:12px; margin-top:5px; background:rgba(255,255,255,0.1); border:1px solid #800020; border-radius:8px; color:#fff;">
                `;
                
                Object.entries(cidades).forEach(([key, cidade]) => {
                    html += `<option value="${key}">${cidade.nome}</option>`;
                });
                
                html += `</select></div>`;
                html += `<div id="bairrosContainer"></div>`;
                
                lista.innerHTML = html;
                
                mudarCidade();
            });
        }

        // ===== FUNÇÕES AUXILIARES =====
        function toggleBairro(cidadeKey, bairroKey, ativo) {
            const inputFrete = document.getElementById(`frete_${cidadeKey}_${bairroKey}`);
            inputFrete.disabled = !ativo;
            
            if (ativo) {
                inputFrete.focus();
            } else {
                dbRef.child(`atendimento/${cidadeKey}_${bairroKey}`).remove();
            }
        }

        function salvarFrete(cidadeKey, bairroKey, valor) {
            const frete = parseFloat(valor);
            if (isNaN(frete) || frete < 0) return;
            
            dbRef.child(`atendimento/${cidadeKey}_${bairroKey}`).set({
                cidade: cidadeKey,
                bairro: bairroKey,
                ativo: true,
                frete: frete
            }).then(() => {
                console.log('Frete salvo!');
            });
        }

        // ===== MUDAR CIDADE =====
        function mudarCidade() {
            const cidadeKey = document.getElementById('seletorCidade').value;
            
            Promise.all([
                database.ref(`bairros_globais/${cidadeKey}/bairros`).once('value'),
                dbRef.child('atendimento').once('value')
            ]).then(([bairrosSnap, atendimentoSnap]) => {
                const bairros = bairrosSnap.val() || {};
                const atendimento = atendimentoSnap.val() || {};
                
                const container = document.getElementById('bairrosContainer');
                
                if (Object.keys(bairros).length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#999;">Nenhum bairro cadastrado nesta cidade</p>';
                    return;
                }
                
                let html = `<h3 style="color:#800020; margin:20px 0;">Bairros:</h3>`;
                
                Object.entries(bairros).forEach(([key, bairro]) => {
                    const config = atendimento[`${cidadeKey}_${key}`] || { ativo: false, frete: 0 };
                    const ativo = config.ativo ? 'checked' : '';
                    const frete = config.frete || '';
                    
                    html += `
                        <div class="bairro-item">
                            <div style="display:flex; align-items:center; gap:10px; flex:1;">
                                <input type="checkbox" id="chk_${cidadeKey}_${key}" ${ativo} onchange="toggleBairro('${cidadeKey}', '${key}', this.checked)" style="width:20px; height:20px;">
                                <div class="bairro-info">
                                    <div class="bairro-nome">${bairro.nome}</div>
                                </div>
                            </div>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <span style="color:#FFC107;">R$</span>
                                <input type="number" id="frete_${cidadeKey}_${key}" value="${frete}" step="0.01" min="0" placeholder="Frete" 
                                       style="width:100px; padding:8px; background:rgba(255,255,255,0.1); border:1px solid #800020; border-radius:8px; color:#fff;"
                                       ${!ativo ? 'disabled' : ''}
                                       onchange="salvarFrete('${cidadeKey}', '${key}', this.value)">
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            });
        }

        // ===== INICIAR =====
        window.onload = function() {
            document.getElementById('dataAtual').textContent = new Date().toLocaleDateString('pt-BR', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            
            configurarAudio();
            iniciarListenerUnico();
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {

            });
            
            document.getElementById('modalLogin').addEventListener('click', (e) => {
